name: Continuous Deployment

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        run: |
          go mod download
          go build ./...

      - name: Run Tests
        run: |
          go test ./... -v

      - name: Build Docker Image
        run: |
          docker build -t go-backend-project:latest -f deployments/docker/Dockerfile .

      - name: Push Docker Image
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag go-backend-project:latest ${{ secrets.DOCKER_USERNAME }}/go-backend-project:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/go-backend-project:latest

      - name: Skip push (missing Docker secrets)
        if: ${{ secrets.DOCKER_USERNAME == '' || secrets.DOCKER_PASSWORD == '' }}
        run: |
          echo "Docker registry secrets are not configured; skipping image push and cluster deployment."

      - name: Deploy to Kubernetes
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        run: |
          echo "Staging deployment placeholder: configure kube credentials and manifests before enabling."

      - name: Notify Deployment
        run: |
          echo "CD workflow completed (staging/manual mode)."