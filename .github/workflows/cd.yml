name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.23'

      - name: Build
        run: |
          go mod tidy
          go build -o go-backend-project ./cmd/main.go

      - name: Run Tests
        run: |
          go test ./... -v

      - name: Build Docker Image
        run: |
          docker build -t go-backend-project:latest -f deployments/docker/Dockerfile .

      - name: Push Docker Image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag go-backend-project:latest your-docker-repo/go-backend-project:latest
          docker push your-docker-repo/go-backend-project:latest

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployments/k8s/deployment.yaml
          kubectl apply -f deployments/k8s/service.yaml
          kubectl apply -f deployments/k8s/configmap.yaml
          kubectl apply -f deployments/k8s/ingress.yaml

      - name: Notify Deployment
        run: |
          echo "Deployment to production completed successfully!"