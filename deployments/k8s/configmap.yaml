apiVersion: v1
kind: ConfigMap
metadata:
  name: go-backend-config
data:
  DATABASE_URL: "postgres://user:password@localhost:5432/go_backend_db?sslmode=disable"
  JWT_SECRET: "your_jwt_secret"
  REDIS_URL: "redis://localhost:6379"
  LOG_LEVEL: "info"
  PORT: "8081"
  RATE_LIMIT: "100"  # requests per minute
  CORS_ORIGINS: "*"  # Adjust as necessary for your application
  IDEMPOTENCY_KEY_EXPIRY: "24h"  # Duration for idempotency key validity
  HEALTH_CHECK_PATH: "/health"  # Path for health checks
  METRICS_PATH: "/metrics"  # Path for Prometheus metrics
  TRACING_ENABLED: "true"  # Enable or disable tracing
  TRACING_SERVICE_NAME: "go-backend-service"  # Service name for tracing