apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-backend-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: go-backend-service
                port:
                  number: 8081
  tls:
    - hosts:
        - yourdomain.com
      secretName: tls-secret