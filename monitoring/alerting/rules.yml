groups:
  - name: "API Errors"
    rules:
      - alert: "High Error Rate"
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (service) > 0.05
        for: 5m
        labels:
          severity: "critical"
        annotations:
          summary: "High error rate detected in {{ $labels.service }}"
          description: "More than 5% of requests are failing in the last 5 minutes."

  - name: "Transaction Failures"
    rules:
      - alert: "Transaction Failure Rate"
        expr: sum(rate(transaction_failures_total[5m])) by (service) > 0.1
        for: 5m
        labels:
          severity: "warning"
        annotations:
          summary: "High transaction failure rate in {{ $labels.service }}"
          description: "More than 10% of transactions are failing in the last 5 minutes."

  - name: "Service Health"
    rules:
      - alert: "Service Down"
        expr: up{job="your_service_name"} == 0
        for: 5m
        labels:
          severity: "critical"
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "The service has been down for more than 5 minutes."

  - name: "Latency Alerts"
    rules:
      - alert: "High Latency"
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 0.5
        for: 5m
        labels:
          severity: "warning"
        annotations:
          summary: "High latency detected in {{ $labels.service }}"
          description: "95th percentile latency is above 500ms in the last 5 minutes."